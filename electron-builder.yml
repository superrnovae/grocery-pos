appId: com.grocerypos.app
productName: grocery-pos
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!test/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
publish:
  provider: generic
  # Placeholder: point this at a real static file host (or swap providers, e.g. GitHub Releases)
  # serving the artifacts in `release/` plus the generated latest.yml before shipping updates.
  url: https://updates.example.com/grocery-pos
win:
  executableName: grocery-pos
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
