appId: com.grocerypos.app
productName: grocery-pos
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!test/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
publish:
  provider: github
  # owner/repo are resolved from package.json's `repository` field. The release workflow
  # (.github/workflows/release.yml) publishes here on every `vX.Y.Z` tag push, and
  # electron-updater (src/main/services/updateService.ts) checks the same repo's
  # Releases for updates at runtime.
win:
  executableName: grocery-pos
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
